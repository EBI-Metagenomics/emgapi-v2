---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff  # Fixes issues (including unused imports)
        args: ["--fix"]
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [--format, parsable, --strict, -c=.yamllint]
  - repo: https://github.com/thoughtworks/talisman
    rev: 'v1.37.0'
    hooks:
      - id: talisman-commit
        entry: cmd --githook pre-commit
  - repo: local
    hooks:
      - id: talismanrc-no-duplicate-filenames
        name: Fail on duplicate filenames in .talismanrc
        entry: >-
          bash -c '
          dupes=$(grep -E "^[[:space:]]*- filename:" .talismanrc \
            | sed -E "s/^[[:space:]]*- filename:[[:space:]]*//" \
            | sort | uniq -d);
          if [ -n "$dupes" ]; then
            echo "Duplicate filename entries in .talismanrc:";
            echo "$dupes";
            exit 1;
          fi'
        language: system
        files: ^\.talismanrc$
        pass_filenames: false
