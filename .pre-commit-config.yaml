---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff  # Fixes issues (including unused imports)
        args: ["--fix"]
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [--format, parsable, --strict, -c=.yamllint]
  - repo: https://github.com/thoughtworks/talisman
    rev: 'v1.37.0'
    hooks:
      - id: talisman-commit
        entry: cmd --githook pre-commit
  - repo: https://github.com/ebi-metagenomics/no_talisman_dupes
    rev: 'v0.1.0'
    hooks:
      - id: talisman-no-duplicate-filenames
  - repo: local
    hooks:
      - id: no-bare-prefect-flow-task
        name: Use django_flow/django_task wrappers instead of bare prefect imports
        language: pygrep
        entry: "from prefect import[^\\n]*(\\bflow\\b|\\btask\\b)"
        types: [python]
        files: ^workflows/
        exclude: ^workflows/tests/test_flows_utils\.py$
      - id: activate-django-before-models
        name: activate_django_first must precede any models import
        language: python
        entry: python scripts/check_activate_django_first.py
        types: [python]
        files: ^workflows/
        exclude: ^workflows/tests/
