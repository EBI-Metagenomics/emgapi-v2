---
name: Release EBI WP K8s HL image

on:  # yamllint disable-line rule:truthy
  workflow_run:
    workflows: [Testing]
    types: [completed]
    branches: [main]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: dockerhub.ebi.ac.uk
          username: ${{ secrets.GITLAB_CONTAINERS_USERNAME }}
          password: ${{ secrets.GITLAB_CONTAINERS_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          context: .
          file: ./deployment/ebi-wp-k8s-hl/Dockerfile
          push: true
          tags: |
            dockerhub.ebi.ac.uk/microbiome-informatics/containers/emgapiv2:ebi-wp-k8s-hl
